<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Revadike">
    <title>Armor Set Wishlist</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="container">
      <div class="top-controls">
        <div class="global-opts">
          <div>
            <h1>Armor Set Wishlist</h1>
            <h1 class="subtext">By <a href="https://github.com/Revadike" target="_blank">Revadike</a></h1>
          </div>
          <div class="checkboxes-container">
            <label>
              <input type="checkbox" id="tier5Toggle">
              <strong>Tier 5 only</strong>
            </label>
            <label>
              <input type="checkbox" id="keepToggle">
              <strong>Respect 'keep' tag</strong>
            </label>
          </div>
          <div class="buttons-container">
            <button id="clearBtn" class="clear-btn">Clear selections</button>
            <button id="importExportBtn" class="clear-btn primary-btn">Import/export</button>
          </div>
          <div id="syncStatus" class="sync-status"></div>
        </div>

        <div class="query-outputs">
          <div class="query-box">
            <div class="label-group">
              <label>Wanted / Keep</label>
              <div class="subtext">DIM query</div>
            </div>
            <div class="textarea-container">
              <textarea id="positiveQuery" readonly></textarea>
              <button class="copy-btn" onclick="copyQuery('positiveQuery', this)">Copy</button>
            </div>
          </div>
          <div class="query-box">
            <div class="label-group">
              <label>Junk / Dismantle</label>
              <div class="subtext">DIM query</div>
            </div>
            <div class="textarea-container">
              <textarea id="negativeQuery" readonly></textarea>
              <button class="copy-btn" onclick="copyQuery('negativeQuery', this)">Copy</button>
            </div>
          </div>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="armorTable">
          <thead>
            <tr>
              <th class="col-set sortable" onclick="setSort('Set')">Set ↕</th>
              <th class="col-effect">Bonus</th>
              <th class="col-tier sortable" onclick="setSort('Tier')">Analysis ↕</th>
              <th class="col-want sortable" onclick="setSort('Want')">Want ↕</th>
              <th class="col-archetypes">Archetypes & tertiary stats</th>
              <th class="col-combine">Combine with</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="8" class="loading">Loading data from Google Sheets...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="script.js"></script>
  </body>

</html>
